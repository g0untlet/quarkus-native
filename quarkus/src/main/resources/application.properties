quarkus.http.port=8080

# Datasource (SQLite)
quarkus.datasource.db-kind=other
## Use WAL journal mode and a busy timeout to reduce "database is locked" errors
quarkus.datasource.jdbc.url=jdbc:sqlite:./data/users.db?journal_mode=WAL&busy_timeout=5000
# Explicit driver for the SQLite JDBC driver
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
# Increase pool size to allow nested/isolated work (ID generation) to acquire a connection
# (SQLite supports limited concurrency; 5 is a reasonable trade-off for local/dev)
quarkus.datasource.jdbc.max-size=5

# Hibernate dialect override for SQLite (use H2 dialect as compatible fallback)
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=false
# Disable Hibernate automatic schema validation; rely on Flyway for schema management.
hibernate.hbm2ddl.auto=none

## Ensure Flyway is enabled and baseline if DB is empty
quarkus.flyway.enabled=true
quarkus.flyway.baseline-on-migrate=true
# Flyway will run migrations from classpath:db/migration by default
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# Native image friendly logging
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."io.quarkus".level=INFO

