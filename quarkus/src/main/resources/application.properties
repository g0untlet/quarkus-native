quarkus.http.port=8080

# Datasource (SQLite)
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.url=jdbc:sqlite:./data/users.db

# Explicit driver for the SQLite JDBC driver
quarkus.datasource.jdbc.driver=org.sqlite.JDBC

# Hibernate dialect override for SQLite (use H2 dialect as compatible fallback)
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=false

# Flyway will run migrations from classpath:db/migration by default
# (keep Hibernate from generating DDL; migrations create the schema)
quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.database.generation=update

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# Native image friendly logging
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."io.quarkus".level=INFO
