# Docker Compose configuration for Quarkus Native + Angular Full Stack
# 
# Prerequisites: Build the native Docker image first:
#   cd quarkus
#   ./mvnw -Pnative -Dquarkus.native.container-build=true -Dquarkus.container-image.build=true -Dquarkus.container-image.name=quarkus-native-users -Dquarkus.container-image.tag=latest clean package
#
# Then start services: docker-compose up -d

services:
  app:
    image: quarkus-native-users:latest
    container_name: quarkus-app
    environment:
      # Configurable: set SQLITE_HOST_PATH to change where DB is stored on the host
      # Default host folder: ./quarkus/data
      # The container DB path is composed from SQLITE_DB_PATH (default /data/users.db)
      SQLITE_HOST_PATH: ${SQLITE_HOST_PATH:-./quarkus/data}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/data/users.db}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:sqlite:${SQLITE_DB_PATH:-/data/users.db}
    ports:
      - "8080:8080"
    volumes:
      # Mount host folder (default ./quarkus/data) into container /data so SQLite file persists
      - ${SQLITE_HOST_PATH:-./quarkus/data}:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 64m

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: quarkus-frontend
    ports:
      - "4200:80"
    depends_on:
      - app
    environment:
      - API_URL=http://app:8080
    networks:
      - app-network

volumes:
  # Optional named volume (not used by default). If you prefer a Docker volume instead of a host path,
  # set SQLITE_HOST_PATH to the volume name (e.g. "sqlite_data") and ensure the mount above matches.
  sqlite_data:
    driver: local

networks:
  app-network:
    driver: bridge
