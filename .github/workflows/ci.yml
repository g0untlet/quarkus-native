name: CI Pipeline

on:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # No external DB service required; use SQLite for tests.

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    # No wait step required for SQLite
        
    - name: Run Quarkus backend tests
      run: |
        cd quarkus
        mvn clean test
      env:
        # Use a file-based SQLite DB for CI tests
        QUARKUS_DATASOURCE_JDBC_URL: jdbc:sqlite:target/test.db
        QUARKUS_DATASOURCE_DRIVER: org.sqlite.JDBC
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run frontend build
      run: |
        cd front
        npm ci
        npm run build
